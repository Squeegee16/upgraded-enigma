# Ham Radio Operator Web Application - Docker Compose Configuration
# ==================================================================
# This Docker Compose file defines the complete application stack with:
# - Main Flask application
# - Persistent data storage
# - Network configuration
# - Optional services (database backup, monitoring)
#
# Usage:
#   docker-compose up -d          # Start in detached mode
#   docker-compose down           # Stop and remove containers
#   docker-compose logs -f app    # View application logs
#   docker-compose exec app bash  # Access container shell

#version: '3.8'

# Named volumes for persistent data storage
# These volumes persist data even when containers are removed
volumes:
  # Main application database and user data
  app_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
    labels:
      description: "Persistent storage for database, logs, and user data"
  
  # SSL certificates (generated or custom)
  app_certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/certs
    labels:
      description: "SSL/TLS certificates for HTTPS"
  
  # Database backups
  app_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/backups
    labels:
      description: "Automated database backups"

# Custom network for service communication
networks:
  hamradio_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    labels:
      description: "Isolated network for Ham Radio App services"

services:
  # =================================================================
  # Main Application Service
  # =================================================================
  app:
    # Build configuration
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-2024-04-15}
        - VCS_REF=${VCS_REF:-dev}
    
    # Container name for easy reference
    container_name: hamradio_app
    
    # Restart policy - always restart unless explicitly stopped
    restart: unless-stopped
    
    # Port mapping: host:container
    # 5000: HTTP (development)
    # 5443: HTTPS (production)
    ports:
      - "5000:5000"    # HTTP
      - "5443:5443"    # HTTPS (if SSL enabled)
    
    # Environment variables for application configuration
    environment:
      # Flask configuration
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      
      # Database configuration
      - DATABASE_URL=sqlite:////data/db/ham_radio.db
      
      # Device configuration
      - USE_MOCK_DEVICES=${USE_MOCK_DEVICES:-true}
      - GPS_SERIAL_PORT=${GPS_SERIAL_PORT:-/dev/ttyUSB0}
      - GPS_BAUD_RATE=${GPS_BAUD_RATE:-9600}
      - RADIO_MODEL=${RADIO_MODEL:-1035}
      - RADIO_PORT=${RADIO_PORT:-/dev/ttyUSB1}
      - RADIO_BAUD_RATE=${RADIO_BAUD_RATE:-38400}
      - SDR_DEVICE_INDEX=${SDR_DEVICE_INDEX:-0}
      - SDR_SAMPLE_RATE=${SDR_SAMPLE_RATE:-2048000}
      
      # SSL configuration
      - USE_SSL=${USE_SSL:-true}
      - SSL_CERT=/data/certs/cert.pem
      - SSL_KEY=/data/certs/key.pem
      
      # Server configuration
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      
      # Callsign validation
      - VALIDATE_CALLSIGNS=${VALIDATE_CALLSIGNS:-false}
      - CALLSIGN_FILE=/data/callsigns/callsigns.txt
      
      # Timezone
      - TZ=${TZ:-UTC}
    
    # Volume mounts for persistent storage
    volumes:
      # Application data (database, logs, etc.)
      - app_data:/data
      
      # SSL certificates
      - app_certs:/data/certs
      
      # Backups
      - app_backups:/data/backups
      
      # Optional: Mount callsign database
      - ./data/callsigns:/data/callsigns:ro
      
      # Optional: Custom plugin directory
      - ./plugins/implementations:/app/plugins/implementations:ro
      
      # Optional: Custom templates (for UI customization)
      - ./templates/custom:/app/templates/custom:ro
    
    # Device access for USB peripherals (GPS, Radio, SDR)
    # Only needed if USE_MOCK_DEVICES=false
    # Commented out for mock device mode
    # devices:
      # GPS device
      - /dev/ttyUSB0:/dev/ttyUSB0
      # Radio device
      - /dev/ttyUSB1:/dev/ttyUSB1
    #   # RTL-SDR device
    #   - /dev/bus/usb:/dev/bus/usb
    
    # Privileged mode for device access
    # WARNING: Only use in trusted environments
    # Alternative: Use --device flags above instead of privileged
    privileged: false
    
    # Network configuration
    networks:
      - hamradio_net
    
    # Resource limits (adjust based on your hardware)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Labels for organization and metadata
    labels:
      - "com.hamradio.app=main"
      - "com.hamradio.version=1.0.0"
      - "com.hamradio.description=Ham Radio Operator Web Application"
  
  # =================================================================
  # Database Backup Service (Optional)
  # =================================================================
  # Automated backup service that creates periodic database backups
  backup:
    image: alpine:latest
    container_name: hamradio_backup
    restart: unless-stopped
    
    # Environment variables
    environment:
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-86400}  # 24 hours in seconds
      - BACKUP_RETENTION=${BACKUP_RETENTION:-7}     # Keep 7 days of backups
    
    # Volume mounts
    volumes:
      - app_data:/data:ro           # Read-only access to data
      - app_backups:/backups        # Write access to backups
    
    # Backup script
    command: >
      sh -c '
      while true; do
        echo "[$(date)] Creating backup..."
        BACKUP_FILE="/backups/ham_radio_$(date +%Y%m%d_%H%M%S).db"
        cp /data/db/ham_radio.db "$$BACKUP_FILE"
        gzip "$$BACKUP_FILE"
        echo "[$(date)] Backup created: $$BACKUP_FILE.gz"
        
        # Remove old backups
        find /backups -name "ham_radio_*.db.gz" -mtime +$$BACKUP_RETENTION -delete
        echo "[$(date)] Old backups cleaned up"
        
        # Wait for next backup interval
        sleep $$BACKUP_INTERVAL
      done
      '
    
    networks:
      - hamradio_net
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    
    # Depends on main app
    depends_on:
      - app
    
    labels:
      - "com.hamradio.app=backup"
      - "com.hamradio.description=Automated database backup service"
  
  # =================================================================
  # Nginx Reverse Proxy (Optional - for production)
  # =================================================================
  # Provides additional security, load balancing, and SSL termination
  # Uncomment to enable
  # nginx:
  #   image: nginx:alpine
  #   container_name: hamradio_nginx
  #   restart: unless-stopped
  #   
  #   ports:
  #     - "80:80"      # HTTP
  #     - "443:443"    # HTTPS
  #   
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #     - ./nginx/logs:/var/log/nginx
