# Ham Radio Operator Web Application - Docker Compose
# =====================================================
# Services:
#   app       - Flask web application
#   openwebrx - OpenWebRX SDR receiver (sidecar)
#   backup    - Automated database backup

version: '3.8'

volumes:
  app_data:
    driver: local
  app_certs:
    driver: local
  app_backups:
    driver: local
  openwebrx_data:
    driver: local

networks:
  hamradio_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:

  # ==========================================================
  # Main Ham Radio Application
  # ==========================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: hamradio_app
    restart: unless-stopped

    ports:
      - "5000:5000"

    environment:
      # Flask
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_DEBUG=${FLASK_DEBUG:-1}

      # Database
      - DATABASE_URL=sqlite:////data/db/ham_radio.db

      # Devices - set USE_MOCK_DEVICES=false when
      # real hardware is connected
      - USE_MOCK_DEVICES=${USE_MOCK_DEVICES:-true}
      - GPS_SERIAL_PORT=${GPS_SERIAL_PORT:-/dev/ttyUSB0}
      - GPS_BAUD_RATE=${GPS_BAUD_RATE:-9600}
      - RADIO_MODEL=${RADIO_MODEL:-1035}
      - RADIO_PORT=${RADIO_PORT:-/dev/ttyUSB1}
      - RADIO_BAUD_RATE=${RADIO_BAUD_RATE:-38400}
      - SDR_DEVICE_INDEX=${SDR_DEVICE_INDEX:-0}
      - SDR_SAMPLE_RATE=${SDR_SAMPLE_RATE:-2048000}

      # SSL
      - USE_SSL=${USE_SSL:-true}
      - SSL_CERT=/data/certs/cert.pem
      - SSL_KEY=/data/certs/key.pem

      # Server
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000

      # Callsign database
      - VALIDATE_CALLSIGNS=${VALIDATE_CALLSIGNS:-false}

      # Timezone
      - TZ=${TZ:-UTC}

      # Plugin installer behaviour
      - PLUGIN_SKIP_PIP_INSTALL=true

      # OpenWebRX sidecar URL (used by the plugin)
      # Points to the openwebrx service on the internal network
      - OPENWEBRX_URL=http://openwebrx:8073

    volumes:
      - app_data:/data
      - app_certs:/data/certs
      - app_backups:/data/backups

    # USB device passthrough for RTL-SDR and GPS
    # Uncomment the devices block when running with
    # real hardware. The privileged flag is required
    # for USB device access on some Linux hosts.
    #
    # To find your device paths on the host:
    #   lsusb
    #   ls -l /dev/bus/usb/
    #   ls -l /dev/ttyUSB*
    #
    devices:
      - /dev/bus/usb:/dev/bus/usb   # All USB (RTL-SDR)
    #   - /dev/ttyUSB0:/dev/ttyUSB0   # GPS
    #   - /dev/ttyUSB1:/dev/ttyUSB1   # Radio CAT
    privileged: true

    networks:
      - hamradio_net

    depends_on:
      - openwebrx

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    labels:
      - "com.hamradio.service=app"
      - "com.hamradio.version=1.0.0"

  # ==========================================================
  # OpenWebRX SDR Receiver - Official Container
  # https://github.com/jketterl/openwebrx
  # ==========================================================
  openwebrx:
    image: jketterl/openwebrx:stable

    container_name: hamradio_openwebrx
    restart: unless-stopped

    ports:
      # Expose OpenWebRX web interface on host port 8073
      # Access directly at http://<server-ip>:8073
      - "8073:8073"

    volumes:
      # Persistent OpenWebRX configuration
      - openwebrx_data:/var/lib/openwebrx

    # USB device access for RTL-SDR
    # Uncomment when RTL-SDR dongle is connected
    #
    devices:
      - /dev/bus/usb:/dev/bus/usb
    privileged: true

    networks:
      - hamradio_net

    # OpenWebRX requires extended privileges for SDR hardware
    # cap_add provides the minimum required capabilities
    # without full privileged mode
    cap_add:
      - SYS_NICE

    environment:
      - TZ=${TZ:-UTC}

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "com.hamradio.service=openwebrx"

  # ==========================================================
  # Database Backup Service
  # ==========================================================
  backup:
    image: alpine:latest
    container_name: hamradio_backup
    restart: unless-stopped

    environment:
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-86400}
      - BACKUP_RETENTION=${BACKUP_RETENTION:-7}

    volumes:
      - app_data:/data:ro
      - app_backups:/backups

    command: >
      sh -c '
      echo "Backup service starting...";
      while true; do
        if [ -f /data/db/ham_radio.db ]; then
          TS=$$(date +%Y%m%d_%H%M%S);
          BF="/backups/ham_radio_$${TS}.db";
          cp /data/db/ham_radio.db "$${BF}";
          gzip "$${BF}";
          echo "[$(date)] Backup created: $${BF}.gz";
          find /backups -name "ham_radio_*.db.gz" \
            -mtime +$${BACKUP_RETENTION} -delete;
          echo "[$(date)] Old backups cleaned";
        else
          echo "[$(date)] Database not found, skipping";
        fi;
        sleep $${BACKUP_INTERVAL};
      done
      '

    networks:
      - hamradio_net

    depends_on:
      - app

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

    labels:
      - "com.hamradio.service=backup"
