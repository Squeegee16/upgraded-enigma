version: '3.8'

volumes:
  app_data:
    driver: local

networks:
  hamradio_net:
    driver: bridge

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: hamradio_app
    restart: unless-stopped
    
    ports:
      - "5000:5000"
      - "5443:5443"
    
    environment:
      # Flask configuration
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
      
      # SECRET_KEY is now optional - will be auto-generated if not provided
      # Uncomment to provide your own key:
      # - SECRET_KEY=${SECRET_KEY}
      
      # Database configuration
      - DATABASE_URL=sqlite:////data/db/ham_radio.db
      
      # Device configuration
      - USE_MOCK_DEVICES=${USE_MOCK_DEVICES:-true}
      - GPS_SERIAL_PORT=${GPS_SERIAL_PORT:-/dev/ttyUSB0}
      - GPS_BAUD_RATE=${GPS_BAUD_RATE:-9600}
      - RADIO_MODEL=${RADIO_MODEL:-1035}
      - RADIO_PORT=${RADIO_PORT:-/dev/ttyUSB1}
      - RADIO_BAUD_RATE=${RADIO_BAUD_RATE:-38400}
      - SDR_DEVICE_INDEX=${SDR_DEVICE_INDEX:-0}
      - SDR_SAMPLE_RATE=${SDR_SAMPLE_RATE:-2048000}
      
      # SSL configuration
      - USE_SSL=${USE_SSL:-true}
      - SSL_CERT=/data/certs/cert.pem
      - SSL_KEY=/data/certs/key.pem
      
      # Server configuration
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      
      # Callsign validation
      - VALIDATE_CALLSIGNS=${VALIDATE_CALLSIGNS:-false}
      - CALLSIGN_FILE=/data/callsigns/callsigns.txt
      
      # Timezone
      - TZ=${TZ:-UTC}
    
    volumes:
      - app_data:/data
    
    networks:
      - hamradio_net
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    labels:
      - "com.hamradio.app=main"
