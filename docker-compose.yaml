# Ham Radio Operator Web Application - Docker Compose
# =====================================================
# Services:
#   app       - Flask web application (port 5000)
#   openwebrx - OpenWebRX SDR receiver sidecar (port 8073)
#   backup    - Automated SQLite database backup
#
# Volume strategy:
#   A single named volume (app_data) is mounted at /data.
#   The application creates all subdirectories at startup.
#   This avoids sub-path mount conflicts.
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose logs -f app    # Follow app logs
#   docker compose build          # Rebuild app image

version: '3.8'

# ============================================================
# Named Volumes
# ============================================================
volumes:
  # Single volume for all application persistent data.
  # The entrypoint script creates subdirectories:
  #   /data/db        - SQLite database
  #   /data/certs     - SSL certificates
  #   /data/backups   - Database backups
  #   /data/callsigns - ISED callsign database
  #   /data/logs      - Application logs
  #   /data/plugins   - Plugin data
  app_data:
    driver: local

  # Separate volume for OpenWebRX configuration.
  # Kept separate so OpenWebRX config survives
  # app_data recreation.
  openwebrx_data:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  hamradio_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================
# Services
# ============================================================
services:

  # ==========================================================
  # Main Ham Radio Application
  # ==========================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: hamradio_app
    restart: unless-stopped

    ports:
      - "5000:5000"

    environment:
      # Flask configuration
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}

      # Database - four slashes required for absolute path
      # with SQLite (sqlite:////absolute/path)
      - DATABASE_URL=sqlite:////data/db/ham_radio.db

      # Device configuration.
      # Set USE_MOCK_DEVICES=false when real hardware is
      # connected and device paths are correct.
      - USE_MOCK_DEVICES=${USE_MOCK_DEVICES:-true}
      - GPS_SERIAL_PORT=${GPS_SERIAL_PORT:-/dev/ttyUSB0}
      - GPS_BAUD_RATE=${GPS_BAUD_RATE:-9600}
      - RADIO_MODEL=${RADIO_MODEL:-1035}
      - RADIO_PORT=${RADIO_PORT:-/dev/ttyUSB1}
      - RADIO_BAUD_RATE=${RADIO_BAUD_RATE:-38400}
      - SDR_DEVICE_INDEX=${SDR_DEVICE_INDEX:-0}
      - SDR_SAMPLE_RATE=${SDR_SAMPLE_RATE:-2048000}

      # SSL configuration.
      # Self-signed cert is auto-generated by the entrypoint
      # script if the cert files do not exist.
      - USE_SSL=${USE_SSL:-true}
      - SSL_CERT=/data/certs/cert.pem
      - SSL_KEY=/data/certs/key.pem

      # Flask server binding
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000

      # Callsign database validation.
      # Set true to enforce Canadian callsign DB check
      # on user registration.
      - VALIDATE_CALLSIGNS=${VALIDATE_CALLSIGNS:-false}

      # Timezone
      - TZ=${TZ:-UTC}

      # Tells all plugin installers NOT to attempt pip or
      # apt installs at runtime. All packages must be in
      # requirements.txt and installed at build time.
      - PLUGIN_SKIP_PIP_INSTALL=true

      # OpenWebRX sidecar URL.
      # Uses the Docker internal network hostname.
      # The openwebrx container is reachable at this address
      # from within the hamradio_net bridge network.
      - OPENWEBRX_URL=http://openwebrx:8073

    volumes:
      # Single volume covers all /data subdirectories.
      # FIX: Removed app_certs and app_backups sub-mounts
      # which conflicted with the app_data parent mount.
      - app_data:/data

    # USB device passthrough for RTL-SDR, GPS, and Radio CAT.
    #
    # INSTRUCTIONS FOR REAL HARDWARE:
    #   1. Connect USB devices
    #   2. Find paths on the host:
    #        lsusb
    #        ls -l /dev/bus/usb/
    #        ls -l /dev/ttyUSB*
    #   3. Uncomment the relevant device lines below
    #   4. Set USE_MOCK_DEVICES=false in .env
    #   5. Run: docker compose up -d
    #
    # NOTE: privileged: true is required for udev-based
    # USB device access. An alternative is to add specific
    # device nodes and use cap_add: [SYS_RAWIO].
    #
    devices:
      - /dev/bus/usb:/dev/bus/usb
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    #   - /dev/ttyUSB1:/dev/ttyUSB1
    privileged: true

    networks:
      - hamradio_net

    # Start openwebrx before app so the sidecar is
    # available when the plugin initialises.
    depends_on:
      - openwebrx

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request;
          urllib.request.urlopen('http://localhost:5000/')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    labels:
      - "com.hamradio.service=app"
      - "com.hamradio.version=0.2.0"


  # ==========================================================
  # OpenWebRX SDR Receiver - Official Docker Image
  # https://github.com/jketterl/openwebrx
  #
  # Runs as a sidecar container. The app service communicates
  # with it via http://openwebrx:8073 on the internal network.
  # The web interface is also exposed on the host at port 8073.
  # ==========================================================
  openwebrx:
    image: jketterl/openwebrx:stable

    container_name: hamradio_openwebrx
    restart: unless-stopped

    ports:
      # Web interface accessible at http://<host-ip>:8073
      - "8073:8073"

    volumes:
      # Persistent OpenWebRX configuration and recordings.
      # Separate from app_data so it survives independent
      # of the main application data.
      - openwebrx_data:/var/lib/openwebrx

    # USB device passthrough for RTL-SDR dongle.
    # Uncomment when hardware is connected.
    # Both app and openwebrx services should NOT use the
    # same RTL-SDR simultaneously — assign the dongle to
    # one service only.
    #
    devices:
      - /dev/bus/usb:/dev/bus/usb
    privileged: true

    networks:
      - hamradio_net

    # SYS_NICE allows OpenWebRX to set thread priorities
    # for real-time SDR processing without full privileged mode.
    # NOTE: When privileged: true is set, cap_add is redundant
    # but kept for documentation purposes.
    cap_add:
      - SYS_NICE

    environment:
      - TZ=${TZ:-UTC}

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "com.hamradio.service=openwebrx"


  # ==========================================================
  # Database Backup Service
  #
  # Runs a simple Alpine shell loop that copies the SQLite
  # database file to /backups on a configurable interval
  # and prunes old backups past the retention period.
  # ==========================================================
  backup:
    image: alpine:latest
    container_name: hamradio_backup
    restart: unless-stopped

    environment:
      # Seconds between backups (default: 86400 = 24 hours)
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-86400}
      # Days to retain backup files (default: 7 days)
      - BACKUP_RETENTION=${BACKUP_RETENTION:-7}

    volumes:
      # Read-only access to application data
      - app_data:/data:ro
      # Read-write access to backup destination.
      # The backup directory lives inside app_data at
      # /data/backups so no separate volume is needed.
      # Using a bind-style subpath here would need
      # additional setup; the simplest approach is to
      # write backups into /data/backups which is already
      # inside the app_data volume.
      - app_data:/backups:rw

    # Inline backup script.
    # Uses $$ to escape $ in Docker Compose variable
    # interpolation (one $ = compose var, $$ = literal $).
    command: >
      sh -c '
      echo "Backup service starting...";
      echo "Interval: $${BACKUP_INTERVAL}s";
      echo "Retention: $${BACKUP_RETENTION} days";
      while true; do
        if [ -f /data/db/ham_radio.db ]; then
          TS=$$(date +%Y%m%d_%H%M%S);
          BF="/backups/backups/ham_radio_$${TS}.db";
          cp /data/db/ham_radio.db "$${BF}" && \
          gzip "$${BF}" && \
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Backup: $${BF}.gz";
          find /backups/backups \
            -name "ham_radio_*.db.gz" \
            -mtime +$${BACKUP_RETENTION} \
            -delete && \
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Pruned old backups";
        else
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] DB not found, skipping";
        fi;
        sleep $${BACKUP_INTERVAL};
      done
      '

    networks:
      - hamradio_net

    depends_on:
      - app

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

    labels:
      - "com.hamradio.service=backup"
