# In your ham-radio-app project directory
cat > blacklist-rtl.conf << 'EOF'
# RTL-SDR kernel driver blacklist
# Applied inside the Docker container
#
# Prevents the Linux kernel from claiming the RTL-SDR
# USB device as a DVB-T tuner, allowing librtlsdr to
# access it directly in userspace.
#
# NOTE: This file must also be applied on the Docker HOST.
# See: /etc/modprobe.d/blacklist-rtl.conf on the host.
blacklist dvb_usb_rtl28xxu
blacklist rtl2832
blacklist rtl2830
blacklist dvb_usb_v2
blacklist dvb_usb
EOF
