# Run on the Docker HOST machine (not inside container)
sudo tee /etc/modprobe.d/blacklist-rtl.conf << 'EOF'
# Blacklist RTL-SDR kernel drivers to allow userspace
# (Docker containers) direct USB access via librtlsdr.
#
# Without this blacklist the kernel claims the device
# as a DVB-T TV tuner and Docker containers cannot
# use it as an SDR dongle.
blacklist dvb_usb_rtl28xxu
blacklist rtl2832
blacklist rtl2830
blacklist dvb_usb_v2
blacklist dvb_usb
EOF

# Reload the udev rules and modprobe config
sudo update-initramfs -u
sudo modprobe -r dvb_usb_rtl28xxu 2>/dev/null || true
sudo modprobe -r rtl2832 2>/dev/null || true

# Verify the modules are unloaded
lsmod | grep dvb
lsmod | grep rtl

# Unplug and replug the RTL-SDR dongle
# then test it again
rtl_test -t
