{% extends "base.html" %}

{% block title %}{{ plugin.name }} - Ham Radio App{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-plug"></i> {{ plugin.name }}</h2>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>
</div>

<div class="card mb-4">
    <div class="card-body">
        <p class="lead">{{ plugin.description }}</p>
        <p class="text-muted">Version {{ plugin.version }} by {{ plugin.author }}</p>
    </div>
</div>

{% block plugin_content %}
<!-- Plugin-specific content goes here -->
{% endblock %}

{% endblock %}
